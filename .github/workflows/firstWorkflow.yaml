name: automatically build and deploy my docker image to dockerhub
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on:
  push:
    branches: [ main ]
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      - name: List files in the repository
        run: |
          ls -lah
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.PASSWORD }}
      - name: Build and push Docker image
        run: |
          
          docker build -t peterincredible2/test_express_app:${{ github.sha }} ./src
          docker push peterincredible2/test_express_app:${{ github.sha }}
      - name: add sha to version in the temp.env file
        run: |
          echo "ID=${{ github.sha }}" > temp.env
          cat temp.env

  deploy-to-ec2-instance:
    needs: Explore-GitHub-Actions
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6
      - name: Deploy to EC2 instance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/gh_action_first_docker_cicd_pipeline
            git fetch --all
            git reset --hard origin/main
            git pull
            docker compose down
            echo "ID=${{ github.sha }}" > temp.env
            
            sudo docker compose --env-file temp.env up
